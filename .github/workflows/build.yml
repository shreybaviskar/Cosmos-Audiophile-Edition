name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          if [ -f .env.template ]; then
            cp .env.template .env
            echo "Copied .env.template to .env"
          fi

      - name: Select Xcode
        run: |
          # Use the default Xcode version provided by the runner
          xcodebuild -version

      - name: Build Application
        run: |
          xcodebuild clean build \
            -project "Cosmos Music Player.xcodeproj" \
            -scheme "Cosmos Music Player" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CONFIGURATION_BUILD_DIR="$PWD/build/Release-iphoneos"

      - name: Export Unsigned IPA
        run: |
          mkdir -p Payload
          # Move the compiled app into the Payload directory
          mv "build/Release-iphoneos/Cosmos Music Player.app" Payload/
          # Zip the Payload folder to create the .ipa file
          zip -r CosmosMusicPlayer.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CosmosMusicPlayer
          path: CosmosMusicPlayer.ipa
          retention-days: 7
